<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog Listener</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>Blog Listener</h1>
          <p id="pageStatus">Checking this page...</p>
        </div>
      </header>

      <section class="controls" aria-label="Playback controls">
        <button id="playButton" class="primary" type="button">Play</button>
        <button id="pauseButton" type="button">Pause</button>
        <button id="stopButton" type="button">Stop</button>
      </section>

      <section class="settings" aria-label="Speech settings">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect"></select>

        <label for="rateInput">Speed <span id="rateValue">1.0x</span></label>
        <input id="rateInput" type="range" min="0.7" max="1.6" step="0.1" value="1">

        <label for="pitchInput">Pitch <span id="pitchValue">1.0</span></label>
        <input id="pitchInput" type="range" min="0.7" max="1.4" step="0.1" value="1">
      </section>

      <p id="message" class="message" role="status"></p>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
